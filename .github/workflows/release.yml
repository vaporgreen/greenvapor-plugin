name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package plugin
        run: |
          zip -r greenvapor.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: greenvapor.zip
          generate_release_notes: true
